<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Host Login — StayScape</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#f6f6f6;height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.card{width:100%;max-width:430px;background:#fff;padding:40px;border-radius:28px;box-shadow:0 10px 40px rgba(0,0,0,.08);}
.logo{font-family:'Playfair Display',serif;font-size:2rem;color:#ff385c;text-align:center;margin-bottom:12px;}
.sub{text-align:center;color:#666;margin-bottom:28px;font-size:.92rem;}
.field{margin-bottom:18px;}
.field label{display:block;margin-bottom:7px;font-size:.82rem;font-weight:700;}
.field input{width:100%;padding:15px;border:1.5px solid #ddd;border-radius:14px;font-size:.92rem;}
.field input:focus{outline:none;border-color:#ff385c;}
.btn{width:100%;padding:15px;background:#ff385c;border:none;border-radius:14px;color:#fff;font-weight:700;font-size:.95rem;cursor:pointer;}
.btn:disabled{opacity:.6;cursor:not-allowed;}
.bottom{margin-top:20px;text-align:center;font-size:.85rem;color:#666;}
.bottom a{color:#ff385c;font-weight:700;text-decoration:none;}
.error-msg{background:#ffe0e6;color:#c0392b;padding:12px 16px;border-radius:12px;font-size:.85rem;margin-bottom:16px;display:none;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">StayScape</div>
  <p class="sub">Login as a host to manage your properties</p>
  <div class="error-msg" id="errorMsg"></div>

  <div class="field">
    <label>Email Address</label>
    <input type="email" id="email" placeholder="Enter your email">
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter your password">
  </div>
  <button class="btn" id="loginBtn" onclick="hostLogin()">Login as Host</button>

  <div class="bottom">
    Don't have a host account? <a href="host-signup.html">Sign up</a>
  </div>
</div>

<script>
async function hostLogin() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('loginBtn');

  document.getElementById('errorMsg').style.display = 'none';
  if (!email || !password) { showError('Email aur password likhein'); return; }

  btn.disabled    = true;
  btn.textContent = 'Logging in...';

  try {
    const res  = await fetch('api.php?action=host_login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();

    if (data.success) {
      window.location.href = 'host-dashboard.html';
    } else {
      showError(data.error || 'Login failed');
      btn.disabled    = false;
      btn.textContent = 'Login as Host';
    }
  } catch(e) {
    showError('Server se connection nahi hua.');
    btn.disabled    = false;
    btn.textContent = 'Login as Host';
  }
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent   = msg;
  el.style.display = 'block';
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') hostLogin(); });
</script>
</body>
</html>
