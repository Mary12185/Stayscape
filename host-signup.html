<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Host Signup - StayScape</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Plus Jakarta Sans';
  background:#f5f5f5;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.box{
  background:#fff;
  padding:40px;
  width:400px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

input{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border:1px solid #ddd;
  border-radius:10px;
}

button{
  width:100%;
  padding:12px;
  background:#ff385c;
  color:#fff;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>
<body>

<div class="box">
  <h2>Host Signup</h2>

  <input type="text" id="name" placeholder="Full Name">
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="signupHost()">Create Host Account</button>
</div>

<script>
async function signupHost() {

  const res = await fetch('api.php?action=host_signup', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      full_name: document.getElementById('name').value,
      email: document.getElementById('email').value,
      password: document.getElementById('password').value
    })
  });

  const data = await res.json();

  if(data.success){
    alert("Host account created!");
    window.location.href = "host-login.html";
  } else {
    alert(data.error);
  }
}
</script>

</body>
</html>
