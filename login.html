<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StayScape — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#f5f5f5;height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-container{width:100%;max-width:450px;background:#fff;padding:42px;border-radius:30px;box-shadow:0 10px 40px rgba(0,0,0,.08);}
.logo{font-family:'Playfair Display',serif;font-size:2.3rem;font-weight:700;color:#ff385c;text-align:center;margin-bottom:12px;}
.sub{text-align:center;color:#666;font-size:.95rem;line-height:1.7;margin-bottom:30px;}
.field{margin-bottom:20px;}
.field label{display:block;margin-bottom:8px;font-size:.82rem;font-weight:700;}
.field input{width:100%;padding:15px;border:1.5px solid #ddd;border-radius:14px;font-size:.92rem;transition:.2s;}
.field input:focus{outline:none;border-color:#ff385c;}
.login-btn{width:100%;padding:15px;background:#ff385c;color:#fff;border:none;border-radius:14px;font-size:.95rem;font-weight:700;cursor:pointer;transition:.2s;}
.login-btn:hover{background:#e22f52;}
.login-btn:disabled{opacity:.6;cursor:not-allowed;}
.bottom{margin-top:24px;text-align:center;font-size:.9rem;color:#666;}
.bottom a{color:#ff385c;font-weight:700;text-decoration:none;}
.error-msg{background:#ffe0e6;color:#c0392b;padding:12px 16px;border-radius:12px;font-size:.85rem;margin-bottom:16px;display:none;}
</style>
</head>
<body>
<div class="login-container">
  <div class="logo">StayScape</div>
  <p class="sub">Login to continue your StayScape experience</p>
  <div class="error-msg" id="errorMsg"></div>

  <div class="field">
    <label>Email Address</label>
    <input type="email" id="email" placeholder="Enter your email" required>
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter your password" required>
  </div>
  <button class="login-btn" id="loginBtn" onclick="loginUser()">Login</button>

  <div class="bottom">
    Don't have an account? <a href="sign-up.html">Sign Up</a>
  </div>
</div>

<script>
async function loginUser() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('loginBtn');
  const errMsg   = document.getElementById('errorMsg');

  errMsg.style.display = 'none';
  
  if (!email || !password) { 
    showError('Please enter email and password'); 
    return; 
  }

  btn.disabled     = true;
  btn.textContent  = 'Logging in...';

  try {
    const response = await fetch('api.php?action=login', {
      method: 'POST',
      headers: { 
        'Content-Type': 'application/json',
        'Accept': 'application/json'
      },
      body: JSON.stringify({ email, password })
    });
    
    if (!response.ok) {
      throw new Error(`HTTP error! status: ${response.status}`);
    }
    
    const data = await response.json();

    if (data.success) {
      // DIRECT TO GUEST DASHBOARD
      window.location.href = 'guest-dashboard.html';
    } else {
      showError(data.error || 'Login failed');
      btn.disabled    = false;
      btn.textContent = 'Login';
    }
  } catch(error) {
    console.error('Fetch error:', error);
    showError('Server connection failed. Please check your connection.');
    btn.disabled    = false;
    btn.textContent = 'Login';
  }
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent    = msg;
  el.style.display  = 'block';
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') loginUser(); });
</script>
</body>
</html>
